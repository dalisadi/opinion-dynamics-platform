    <title>Inscription</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='inscription.css') }}">

<body>
    <header>
        <div class="logo">
            <span class="v">V</span>
            <span class="neutre">/</span>
            <span class="s">S</span>
        </div>  
        <nav>
            <a href="{{ url_for('acc') }}">Accueil</a>
            {% if 'username' in session %}
                <a href="{{ url_for('creerdebat') }}">Créer un débat</a>
                <a href="{{ url_for('logout') }}">Déconnexion</a>
            {% else %}
                <a href="{{ url_for('connexion') }}">Connexion</a>
                <a href="{{ url_for('inscription') }}" class="active">Inscription</a>
            {% endif %}
        </nav>
        {% if is_logged_in %}
        <div class="profil-btn">
            <a href="{{ url_for('profil') }}" class="profil-circle">{{ session['username'][0] | upper }}</a>
        </div>
        {% endif %}
    </header>
